---
layout: default
---

<div class="pdf-shell">
  <article class="pdf-page wide-page">
    <h1 class="mb-3">{{ page.title }}</h1>

    <nav style="margin: 0.75rem 0 1rem 0; display:flex; gap:1rem; flex-wrap:wrap;">
      <a href="{{ '/projects/' | relative_url }}">← Projects</a>
      <a href="{{ '/cv/' | relative_url }}">CV</a>
      <a href="{{ '/' | relative_url }}">Home</a>
    </nav>

    {% if page.image %}
    <img src="{{ page.image | relative_url }}" alt="{{ page.imagealt }}" class="img-fluid rounded mb-4"
      style="width:30%; max-height:340px; object-fit:cover; display:block; margin:0 auto 1.5rem auto;">
    {% endif %}

    {% if page.math %}
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [['\\(', '\\)'], ['$', '$']],
            displayMath: [['$$','$$'], ['\\[','\\]']]
          },
          options: {
            skipHtmlTags: ['script','noscript','style','textarea','pre','code']
          }
        };
      </script>
      <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    {% endif %}

    {{ content }}

    {% if page.technologies %}
      <hr class="pdf-hr">
      <p><strong>Technologies Used</strong>: {{ page.technologies | join: ", " }}</p>
    {% endif %}

    <a href="{{ '/projects/' | relative_url }}" class="btn btn-outline-light mt-3">
      <i class="bi bi-arrow-left"></i> Back to Projects
    </a>
  </article>
</div>
